<div class="calendar-page">

    <!-- Page Header -->
    <div class="page-header">
        <div>
            <h1 class="page-title">Calendar</h1>
            <p class="page-subtitle">View and manage your events</p>
        </div>
        <div class="header-right">
            <p-select [options]="calendarList" [(ngModel)]="selectedCalendarId" optionLabel="name"
                optionValue="calendarId" placeholder="Select a Calendar" (onChange)="onCalendarChange()"
                [overlayOptions]="{ appendTo: 'body' }" [style]="{ minWidth: '200px' }" />
            <span class="event-count" *ngIf="selectedCalendarId">
                {{ events.length }} event{{ events.length !== 1 ? 's' : '' }}
            </span>
        </div>
    </div>

    <!-- FullCalendar -->
    <div class="calendar-wrapper">
        <div #calendarEl></div>
    </div>

</div>

<!-- Create Event Dialog -->
<p-dialog header="New Event" [(visible)]="showDialog" [style]="{ width: '460px' }" [modal]="true" [draggable]="false"
    [resizable]="false">
    <div style="padding: 0.5rem 0; display: flex; flex-direction: column; gap: 1.2rem;">

        <div style="display: flex; flex-direction: column; gap: 0.4rem;">
            <label
                style="font-size: 0.8rem; font-weight: 600; color: #374151; text-transform: uppercase; letter-spacing: 0.05em;">Event
                Name</label>
            <input pInputText placeholder="e.g. Doctor Appointment" [(ngModel)]="newEvent.name"
                style="width: 100%; padding: 0.65rem 0.9rem; border-radius: 8px; border: 1.5px solid #E5E7EB; font-size: 0.95rem;" />
        </div>

        <div style="display: flex; flex-direction: column; gap: 0.4rem;">
            <label
                style="font-size: 0.8rem; font-weight: 600; color: #374151; text-transform: uppercase; letter-spacing: 0.05em;">Description</label>
            <input pInputText placeholder="Optional details" [(ngModel)]="newEvent.description"
                style="width: 100%; padding: 0.65rem 0.9rem; border-radius: 8px; border: 1.5px solid #E5E7EB; font-size: 0.95rem;" />
        </div>

        <div style="display: flex; flex-direction: column; gap: 0.6rem;">
            <label
                style="font-size: 0.8rem; font-weight: 600; color: #374151; text-transform: uppercase; letter-spacing: 0.05em;">Color</label>
            <div style="display: flex; flex-direction: row; gap: 10px; align-items: center;">
                <div *ngFor="let color of colorOptions" (click)="newEvent.color = color.value" [title]="color.label"
                    [style]="{
            background: color.value, width: '32px', height: '32px',
            borderRadius: '50%', cursor: 'pointer', transition: 'transform 0.15s',
            transform: newEvent.color === color.value ? 'scale(1.25)' : 'scale(1)',
            boxShadow: newEvent.color === color.value ? '0 0 0 3px white, 0 0 0 5px ' + color.value : 'none'
          }">
                </div>
            </div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 0.4rem;">
            <label
                style="font-size: 0.8rem; font-weight: 600; color: #374151; text-transform: uppercase; letter-spacing: 0.05em;">Repeat</label>
            <p-select [options]="recurrenceOptions" [(ngModel)]="newEvent.recurrence" optionLabel="label"
                optionValue="value" [style]="{ width: '100%', borderRadius: '8px' }" />
        </div>

        <hr style="border: none; border-top: 1px solid #F3F4F6; margin: 0.2rem 0;" />

        <div style="display: flex; justify-content: flex-end; gap: 10px;">
            <p-button label="Cancel" severity="secondary" [outlined]="true" (click)="showDialog = false" />
            <p-button label="Create Event" [loading]="loading" (click)="onCreate()" />
        </div>

    </div>
</p-dialog>

<!-- Event Detail Dialog -->
<p-dialog header="Event Details" [(visible)]="showDetailDialog" [style]="{ width: '420px' }" [modal]="true"
    [draggable]="false" [resizable]="false">
    <div style="padding: 0.5rem 0; display: flex; flex-direction: column; gap: 1.2rem;" *ngIf="selectedEvent">

        <div style="display: flex; align-items: center; gap: 0.8rem;">
            <div [style]="{
        width: '14px', height: '14px', borderRadius: '50%', flexShrink: '0',
        background: selectedEvent.backgroundColor || '#3B82F6'
      }"></div>
            <span style="font-size: 1.15rem; font-weight: 700; color: #111827;">{{ selectedEvent.title }}</span>
        </div>

        <div *ngIf="selectedEvent.extendedProps?.description"
            style="display: flex; gap: 0.7rem; align-items: flex-start;">
            <i class="pi pi-align-left" style="color: #9CA3AF; margin-top: 2px;"></i>
            <span style="color: #4B5563; font-size: 0.95rem;">{{ selectedEvent.extendedProps.description }}</span>
        </div>

        <div style="display: flex; gap: 0.7rem; align-items: center;">
            <i class="pi pi-calendar" style="color: #9CA3AF;"></i>
            <span style="color: #4B5563; font-size: 0.9rem;">{{ selectedEvent.startStr | date:'EEEE, MMMM d, y'
                }}</span>
        </div>

        <div *ngIf="selectedEvent.extendedProps?.recurrence && selectedEvent.extendedProps?.recurrence !== 'none'"
            style="display: flex; gap: 0.7rem; align-items: center;">
            <i class="pi pi-refresh" style="color: #9CA3AF;"></i>
            <span style="color: #4B5563; font-size: 0.9rem; text-transform: capitalize;">
                Repeats {{ selectedEvent.extendedProps.recurrence }}
            </span>
        </div>

        <hr style="border: none; border-top: 1px solid #F3F4F6; margin: 0;" />

        <div style="display: flex; justify-content: flex-end; gap: 10px;">
            <p-button label="Close" severity="secondary" [outlined]="true" (click)="showDetailDialog = false" />
        </div>

    </div>
</p-dialog>
