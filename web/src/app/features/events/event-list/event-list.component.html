<div class="events-page">

  <!-- Page Header -->
  <div class="page-header">
    <div class="header-left">
      <p-button
        icon="pi pi-arrow-left"
        severity="secondary"
        [text]="true"
        [rounded]="true"
        (click)="goBack()"
      />
      <div>
        <h1 class="page-title">Events</h1>
        <p class="page-subtitle">{{ events.length }} event{{ events.length !== 1 ? 's' : '' }} in this calendar</p>
      </div>
    </div>
    <p-button
      label="New Event"
      icon="pi pi-plus"
      (click)="showDialog = true"
    />
  </div>

  <!-- Empty State -->
  <div *ngIf="events.length === 0" class="empty-state">
    <i class="pi pi-calendar-plus"></i>
    <p>No events yet. Create your first one!</p>
    <p-button label="New Event" icon="pi pi-plus" (click)="showDialog = true" />
  </div>

  <!-- Events List -->
  <div class="events-grid">
    <div *ngFor="let event of events" class="event-card">
      <div class="event-card-left">
        <div class="event-color-dot" [style.background]="event.color || '#3B82F6'"></div>
      </div>
      <div class="event-card-body">
        <div class="event-header">
          <h3 class="event-name">{{ event.name }}</h3>
          <p-tag
            *ngIf="event.recurrence && event.recurrence !== 'none'"
            [value]="event.recurrence | titlecase"
            severity="info"
            icon="pi pi-refresh"
          />
        </div>
        <p class="event-description" *ngIf="event.description">{{ event.description }}</p>
        <div class="event-dates">
          <i class="pi pi-calendar"></i>
          <span>{{ event.startDate | date:'MMM d, y' }}</span>
          <span *ngIf="event.endDate"> — {{ event.endDate | date:'MMM d, y' }}</span>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- New Event Dialog -->
<p-dialog
  header="New Event"
  [(visible)]="showDialog"
  [style]="{ width: '420px' }"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
>
  <div style="display: flex; flex-direction: column; gap: 1.2rem; padding: 0.5rem 0;">

    <div style="display: flex; flex-direction: column; gap: 0.4rem;">
      <label style="font-size: 0.8rem; font-weight: 600; color: #374151; text-transform: uppercase; letter-spacing: 0.05em;">Event Name</label>
      <input pInputText placeholder="e.g. Team Meeting" [(ngModel)]="newName" style="width: 100%; border-radius: 8px;" />
    </div>

    <div style="display: flex; flex-direction: column; gap: 0.4rem;">
      <label style="font-size: 0.8rem; font-weight: 600; color: #374151; text-transform: uppercase; letter-spacing: 0.05em;">Description</label>
      <input pInputText placeholder="Optional" [(ngModel)]="newDescription" style="width: 100%; border-radius: 8px;" />
    </div>

    <div style="display: flex; flex-direction: column; gap: 0.4rem;">
      <label style="font-size: 0.8rem; font-weight: 600; color: #374151; text-transform: uppercase; letter-spacing: 0.05em;">Start Date</label>
      <input pInputText placeholder="e.g. 2026-03-10T09:00:00Z" [(ngModel)]="newStartDate" style="width: 100%; border-radius: 8px;" />
    </div>

    <div style="display: flex; flex-direction: column; gap: 0.4rem;">
      <label style="font-size: 0.8rem; font-weight: 600; color: #374151; text-transform: uppercase; letter-spacing: 0.05em;">End Date</label>
      <input pInputText placeholder="e.g. 2026-03-10T10:00:00Z" [(ngModel)]="newEndDate" style="width: 100%; border-radius: 8px;" />
    </div>

    <hr style="border: none; border-top: 1px solid #F3F4F6; margin: 0;" />

    <div style="display: flex; justify-content: flex-end; gap: 10px;">
      <p-button label="Cancel" severity="secondary" [outlined]="true" (click)="showDialog = false" />
      <p-button label="Create Event" [loading]="loading" (click)="onCreate()" />
    </div>

  </div>
</p-dialog>
